# Railway staging/demo deploy — see ops/railway/README.md
[build]
builder = "DOCKERFILE"
dockerfilePath = "ops/railway/Dockerfile.staging"

[deploy]
startCommand = "node scripts/railway-staging-start.mjs"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5