apiVersion: batch/v1
kind: CronJob
metadata:
  name: astranull-connector-poll-runner
  labels:
    app.kubernetes.io/name: astranull
    app.kubernetes.io/component: connector-poll-runner
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: astranull
            app.kubernetes.io/component: connector-poll-runner
        spec:
          restartPolicy: Never
          serviceAccountName: astranull-worker
          containers:
            - name: runner
              image: ghcr.io/astranull/astranull-worker:latest
              imagePullPolicy: IfNotPresent
              command: ["node", "scripts/connector-poll-runner.mjs"]
              args:
                - "--tenant-ids-file"
                - "/config/tenant-ids.json"
                - "--out"
                - "/tmp/connector-poll-summary.json"
              envFrom:
                - secretRef:
                    name: astranull-worker-env
              env:
                - name: ASTRANULL_WAF_POSTURE_ENABLED
                  value: "1"
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 768Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 10001
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
                - name: tenant-scope
                  mountPath: /config
                  readOnly: true
          volumes:
            - name: tmp
              emptyDir: {}
            - name: tenant-scope
              configMap:
                name: astranull-worker-tenant-ids