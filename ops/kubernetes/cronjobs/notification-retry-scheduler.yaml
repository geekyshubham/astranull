apiVersion: batch/v1
kind: CronJob
metadata:
  name: astranull-notification-retry-scheduler
  labels:
    app.kubernetes.io/name: astranull
    app.kubernetes.io/component: notification-retry-scheduler
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: astranull
            app.kubernetes.io/component: notification-retry-scheduler
        spec:
          restartPolicy: Never
          serviceAccountName: astranull-worker
          containers:
            - name: runner
              image: ghcr.io/astranull/astranull-worker:latest
              imagePullPolicy: IfNotPresent
              command: ["node", "scripts/notification-retry-scheduler.mjs"]
              args:
                - "--tenant-ids-file"
                - "/config/tenant-ids.json"
                - "--once"
                - "--out"
                - "/tmp/notification-retry-summary.json"
              envFrom:
                - secretRef:
                    name: astranull-worker-env
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 300m
                  memory: 384Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 10001
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
                - name: tenant-scope
                  mountPath: /config
                  readOnly: true
          volumes:
            - name: tmp
              emptyDir: {}
            - name: tenant-scope
              configMap:
                name: astranull-worker-tenant-ids