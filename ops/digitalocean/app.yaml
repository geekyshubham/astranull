# DigitalOcean App Platform spec — astranull.site
# Create once: doctl apps create --spec ops/digitalocean/app.yaml
# Update:      doctl apps update <APP_ID> --spec ops/digitalocean/app.yaml
name: astranull
region: nyc

domains:
  - domain: astranull.site
    type: PRIMARY
  - domain: www.astranull.site
    type: ALIAS

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

databases:
  - name: astranull-db
    engine: PG
    version: "16"
    size: db-s-dev
    num_nodes: 1

services:
  - name: web
    dockerfile_path: ops/digitalocean/Dockerfile
    source_dir: /
    github:
      repo: geekyshubham/astranull
      branch: main
      deploy_on_push: false
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
      initial_delay_seconds: 90
      period_seconds: 15
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 5
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: PORT
        scope: RUN_TIME
        value: "8080"
      - key: ASTRANULL_PUBLIC_BASE_URL
        scope: RUN_TIME
        value: https://astranull.site
      - key: ASTRANULL_PERSISTENCE_MODE
        scope: RUN_TIME
        value: postgres
      - key: ASTRANULL_DEPLOYMENT_PROFILE
        scope: RUN_TIME
        value: hosted-staging
      - key: ASTRANULL_BUNDLED_STAGING_OIDC
        scope: RUN_TIME
        value: "1"
      - key: ASTRANULL_AUTH_MODE
        scope: RUN_TIME
        value: oidc-jwt
      # OIDC identity is PINNED to the currently LIVE host
      # (astranull-qteog.ondigitalocean.app), NOT to ASTRANULL_PUBLIC_BASE_URL.
      # Rationale: bundledStagingOidc derives issuer/JWKS from the public base URL
      # when these are unset. This spec keeps the astranull.site custom domain as
      # the public base URL, but existing tokens were minted with the
      # ondigitalocean issuer. Pinning here keeps both DO specs consistent on
      # OIDC identity and prevents a `doctl apps update` from silently flipping
      # the issuer and invalidating all live tokens. The app serves
      # /.well-known/jwks.json on every hostname it answers, so the pinned JWKS
      # URL resolves regardless of the public base URL.
      - key: ASTRANULL_OIDC_ISSUER
        scope: RUN_TIME
        value: https://astranull-qteog.ondigitalocean.app/staging-oidc
      - key: ASTRANULL_OIDC_JWKS_URL
        scope: RUN_TIME
        value: https://astranull-qteog.ondigitalocean.app/.well-known/jwks.json
      - key: ASTRANULL_PUBLIC_LOGIN_URL
        scope: RUN_TIME
        value: /login
      - key: ASTRANULL_PROBE_MODE
        scope: RUN_TIME
        value: signed-worker
      - key: ASTRANULL_HIGH_SCALE_ADAPTER_MODE
        scope: RUN_TIME
        value: disabled
      - key: ASTRANULL_AGENT_IDENTITY_MODE
        scope: RUN_TIME
        value: bearer
      - key: ASTRANULL_WAF_POSTURE_ENABLED
        scope: RUN_TIME
        value: "1"
      - key: ASTRANULL_CONNECTORS_ENABLED
        scope: RUN_TIME
        value: "0"
      - key: ASTRANULL_DATABASE_URL
        scope: RUN_TIME
        value: ${astranull-db.DATABASE_URL}
      - key: ASTRANULL_PG_SSL_REJECT_UNAUTHORIZED
        scope: RUN_TIME
        value: "0"
      # Set these in the DO dashboard (or as encrypted app envs) before first deploy:
      # - ASTRANULL_SECRET_ENCRYPTION_KEY  (64 hex chars)
      # - ASTRANULL_PROBE_WORKER_SECRET    (32+ chars)