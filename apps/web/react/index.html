<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AstraNull</title>
  <meta name="description" content="AstraNull — no-access-first DDoS readiness validation. React + TypeScript + Vite readiness console." />
  <meta name="color-scheme" content="dark light" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />

  <!-- Early theme init (light/dark) so there is no flash before React boots. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('astranull.theme');
        if (!t) t = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
      } catch (e) {}
    })();
  </script>

  <!-- Space Grotesk · Inter · JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!--
    Boot styles. A minimal token subset (values identical to src/styles.css) paints
    the canvas and splash BEFORE the app's stylesheet + module arrive — no white/black
    flash. The splash lives inside #root and is removed automatically the instant React
    mounts, because createRoot(#root).render() replaces #root's children on first commit.
  -->
  <style>
    :root {
      --boot-bg: #000;
      --boot-fg: #f0f0f0;
      --boot-muted: #7e8386;
      --boot-border: rgba(214, 235, 253, .19);
      --boot-accent: #ff801f;
      --boot-font-display: "Space Grotesk", "Inter", -apple-system, system-ui, "Segoe UI", Arial, sans-serif;
      --boot-font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
    }
    [data-theme="light"] {
      --boot-bg: #fff;
      --boot-fg: #0b0d0f;
      --boot-muted: #5b6066;
      --boot-border: rgba(9, 20, 36, .14);
    }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--boot-bg);
      color: var(--boot-fg);
      font-family: "Inter", -apple-system, system-ui, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    #boot-splash {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--boot-bg);
    }
    .boot-inner { display: flex; flex-direction: column; align-items: center; text-align: center; }
    .boot-loader { position: relative; width: 72px; height: 72px; display: grid; place-items: center; }
    .boot-loader .brand-mark { width: 42px; height: 42px; display: block; overflow: visible; }
    .boot-loader .brand-mark .ring { fill: none; stroke: var(--boot-fg); stroke-width: 1.6px; }
    .boot-loader .brand-mark .core { fill: var(--boot-fg); }
    .boot-spin { position: absolute; inset: 0; width: 72px; height: 72px; animation: boot-rotate 1.05s linear infinite; }
    .boot-spin-track { fill: none; stroke: var(--boot-border); stroke-width: 2; }
    .boot-spin-arc {
      fill: none;
      stroke: var(--boot-accent);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-dasharray: 34 200;
    }
    @keyframes boot-rotate { to { transform: rotate(360deg); } }
    .boot-word {
      margin-top: 22px;
      font-family: var(--boot-font-display);
      font-weight: 600;
      font-size: clamp(22px, 5vw, 30px);
      letter-spacing: -.02em;
      color: var(--boot-fg);
    }
    .boot-status {
      margin: 11px 0 0;
      font-family: var(--boot-font-mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--boot-muted);
    }
    @media (prefers-reduced-motion: reduce) {
      .boot-spin { animation: none; }
      .boot-spin-arc { display: none; }
      .boot-spin-track { stroke: var(--boot-accent); opacity: .55; }
    }
  </style>
</head>
<body>
  <div id="root">
    <!-- Pre-mount splash — React replaces this on its first commit (createRoot). -->
    <div id="boot-splash" role="status" aria-live="polite" aria-label="Loading the AstraNull console">
      <div class="boot-inner">
        <div class="boot-loader">
          <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
            <defs>
              <clipPath id="bootMarkClip"><circle cx="16" cy="16" r="13.4" /></clipPath>
            </defs>
            <circle class="ring" cx="16" cy="16" r="14.5" />
            <path class="core" clip-path="url(#bootMarkClip)" d="M16 -5 L34.6 27 L-2.6 27 Z" />
          </svg>
          <svg class="boot-spin" viewBox="0 0 44 44" aria-hidden="true" focusable="false">
            <circle class="boot-spin-track" cx="22" cy="22" r="20" />
            <circle class="boot-spin-arc" cx="22" cy="22" r="20" />
          </svg>
        </div>
        <div class="boot-word">AstraNull</div>
        <p class="boot-status">Loading console</p>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
