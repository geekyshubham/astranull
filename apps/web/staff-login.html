<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Staff sign-in — AstraNull Internal</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="public-page">
  <header class="public-header">
    <div class="public-brand">AstraNull Staff</div>
    <nav class="public-nav">
      <a href="/" class="btn secondary">Public site</a>
    </nav>
  </header>
  <main class="public-form-shell">
    <div class="card public-form-card login-card">
      <p class="public-eyebrow">Internal management</p>
      <h1>Staff sign-in</h1>
      <p class="muted" id="staffLoginIntro">
        Tenant lifecycle, sign-up queue, subscriptions, and internal audit — not the customer portal.
      </p>
      <form id="staffLoginForm" class="public-form">
        <label>
          Staff ID
          <input id="staffId" name="staff_id" type="text" value="staff_admin" autocomplete="username" required />
        </label>
        <label>
          Staff role (staging demo)
          <select id="staffRole" name="staff_role">
            <option value="internal_admin" selected>internal_admin</option>
            <option value="billing_ops">billing_ops</option>
            <option value="support_engineer">support_engineer</option>
            <option value="security_admin">security_admin</option>
            <option value="soc_analyst">soc_analyst</option>
            <option value="soc_lead">soc_lead</option>
          </select>
        </label>
        <button type="submit" class="btn" id="staffLoginSubmit">Continue to internal admin</button>
      </form>
      <p class="muted login-footnote">
        Customer users should use <a href="/login">customer portal login</a> at <code>/login</code> → <code>/app</code>.
      </p>
      <p class="public-error" id="staffLoginError" hidden></p>
    </div>
  </main>
  <script type="module" src="/staff-login.mjs"></script>
</body>
</html>
