name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Lint
        run: node scripts/lint.mjs

      - name: Unit tests
        run: node --test tests/unit/*.test.mjs

      - name: Integration tests
        run: node --test tests/integration/*.test.mjs

      - name: E2E tests
        run: node --test tests/e2e/*.test.mjs

      - name: Safety check
        run: node scripts/safety-check.mjs

      - name: Postgres tenant query audit
        run: node scripts/postgres-tenant-query-audit.mjs