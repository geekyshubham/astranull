name: Deploy DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-digitalocean
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: node scripts/lint.mjs

      - name: Deploy gate tests
        run: |
          node --test \
            tests/unit/product-scope.test.mjs \
            tests/unit/bundled-staging-oidc.test.mjs \
            tests/unit/react-portal-auth.test.mjs \
            tests/unit/railway-staging-start.test.mjs \
            tests/e2e/ui-smoke.test.mjs

      - name: Safety check
        run: node scripts/safety-check.mjs

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ops/digitalocean/Dockerfile
          push: true
          tags: ghcr.io/geekyshubham/astranull:latest

      - name: Deploy to App Platform
        uses: digitalocean/app_action/deploy@v2
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          GHCR_CREDENTIALS: ${{ secrets.GHCR_CREDENTIALS }}
          ASTRANULL_SECRET_ENCRYPTION_KEY: ${{ secrets.ASTRANULL_SECRET_ENCRYPTION_KEY }}
          ASTRANULL_PROBE_WORKER_SECRET: ${{ secrets.ASTRANULL_PROBE_WORKER_SECRET }}
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          app_spec_location: .do/app.yaml
          print_build_logs: true
          print_deploy_logs: true